
services:
  php:
    build: .
    container_name: php_app
    volumes:
      - ./:/var/www/html
    ports:
      - "8080:80"
    environment:
       JWT_KEY: ${JWT_KEY}
       DB_HOST: mysql
       DB_NAME: ${DB_NAME}
       DB_USER: root
       DB_PASS: ${DB_PASS}
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"